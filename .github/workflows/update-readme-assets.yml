name: Update README Screenshot

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run screenshot update script
        run: |
          chmod +x scripts/update-assets.sh
          ./scripts/update-assets.sh

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/screenshot.png
          git commit -m "docs: update readme screenshot for ${{ github.ref_name }} [skip ci]" || echo "No changes to commit"
          git push origin main
